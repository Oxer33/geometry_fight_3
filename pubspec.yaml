name: geometry_fight_3
description: "Geometry Fight 3 - Twin-stick shooter neon ispirato a Geometry Wars"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.27.0"

# ============================================================
# DIPENDENZE PRINCIPALI
# ============================================================
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- Game Engine ---
  flame: ^1.24.0              # Engine di gioco principale

  # --- State Management ---
  flutter_riverpod: ^2.6.1    # State management reattivo

  # --- Persistenza Dati ---
  hive: ^2.2.3                # Database locale veloce
  hive_flutter: ^1.1.0        # Integrazione Hive con Flutter
  shared_preferences: ^2.3.3  # Settings semplici

  # --- Input ---
  flutter_joystick: ^0.2.1    # Joystick virtuali per mobile

  # --- Audio ---
  flame_audio: ^2.10.5        # Audio per Flame
  audioplayers: ^6.1.0        # Audio generico

  # --- Utility ---
  collection: ^1.19.0         # Utility per collezioni
  vector_math: ^2.1.4         # Matematica vettoriale

  # --- Shader/VFX ---
  flutter_shaders: ^0.1.0     # Shader personalizzati

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

# ============================================================
# CONFIGURAZIONE FLUTTER
# ============================================================
flutter:
  uses-material-design: true

  # --- Assets ---
  assets:
    - assets/audio/sfx/
    - assets/audio/bgm/
    - assets/shaders/
    - assets/images/
    - assets/icons/
